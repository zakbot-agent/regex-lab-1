<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>regex-lab</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #24243a;
    --border: #2e2e48;
    --text: #e0e0f0;
    --text-dim: #8888aa;
    --accent: #6c63ff;
    --accent2: #00d9a3;
    --match-bg: #00d9a333;
    --match-border: #00d9a3;
    --error: #ff4466;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--accent2); }

  .subtitle { color: var(--text-dim); font-size: 0.85rem; }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 1rem;
    padding: 1rem 2rem;
    max-width: 1600px;
    margin: 0 auto;
    min-height: calc(100vh - 70px);
  }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; padding: 1rem; }
    header { padding: 1rem; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
  }

  .panel h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 0.8rem;
  }

  .input-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.8rem;
    flex-wrap: wrap;
  }

  .regex-input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 0.6rem;
    min-width: 200px;
  }

  .regex-input-wrap:focus-within { border-color: var(--accent); }

  .regex-input-wrap .slash { color: var(--accent); font-family: var(--mono); font-weight: 700; }

  #regexInput {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 1rem;
    padding: 0.6rem 0.4rem;
    outline: none;
  }

  .flags-row {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .flag-check { display: flex; align-items: center; gap: 0.3rem; cursor: pointer; }

  .flag-check input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
  }

  .flag-check label { font-family: var(--mono); font-size: 0.9rem; cursor: pointer; color: var(--text-dim); }

  select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem;
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
  }

  select:focus { border-color: var(--accent); }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.95rem;
    padding: 0.8rem;
    resize: vertical;
    min-height: 120px;
    outline: none;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }

  .highlight-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.8rem;
    font-family: var(--mono);
    font-size: 0.95rem;
    min-height: 60px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .highlight-area .match {
    background: var(--match-bg);
    border-bottom: 2px solid var(--match-border);
    border-radius: 2px;
    padding: 0 2px;
  }

  .match-list {
    margin-top: 0.8rem;
    max-height: 300px;
    overflow-y: auto;
  }

  .match-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    margin-bottom: 0.5rem;
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .match-item .match-val { color: var(--accent2); font-weight: 600; }
  .match-item .match-pos { color: var(--text-dim); font-size: 0.8rem; }
  .match-item .match-group { color: #ffb86c; margin-left: 1rem; }

  .explain-list { list-style: none; }

  .explain-list li {
    padding: 0.3rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    display: flex;
    gap: 0.8rem;
  }

  .explain-list li:last-child { border-bottom: none; }

  .token-raw {
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 600;
    min-width: 80px;
    flex-shrink: 0;
  }

  .token-explain { color: var(--text-dim); }

  .error-msg {
    color: var(--error);
    font-size: 0.85rem;
    margin-top: 0.4rem;
    font-family: var(--mono);
  }

  .sidebar { display: flex; flex-direction: column; gap: 1rem; }

  .stats {
    display: flex;
    gap: 1rem;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .stat strong { color: var(--accent2); font-size: 1rem; }
</style>
</head>
<body>

<header>
  <h1>regex<span>-lab</span></h1>
  <span class="subtitle">Test, match, and understand regular expressions</span>
</header>

<div class="main-grid">
  <div class="left-col">
    <div class="panel" style="margin-bottom:1rem">
      <h2>Pattern</h2>
      <div class="input-row">
        <div class="regex-input-wrap">
          <span class="slash">/</span>
          <input type="text" id="regexInput" placeholder="Enter regex pattern..." spellcheck="false">
          <span class="slash">/</span>
        </div>
        <select id="commonSelect">
          <option value="">Common patterns...</option>
        </select>
      </div>
      <div class="flags-row">
        <div class="flag-check">
          <input type="checkbox" id="flagG" checked><label for="flagG">g</label>
        </div>
        <div class="flag-check">
          <input type="checkbox" id="flagI"><label for="flagI">i</label>
        </div>
        <div class="flag-check">
          <input type="checkbox" id="flagM"><label for="flagM">m</label>
        </div>
        <div class="flag-check">
          <input type="checkbox" id="flagS"><label for="flagS">s</label>
        </div>
      </div>
      <div id="errorMsg" class="error-msg"></div>
    </div>

    <div class="panel" style="margin-bottom:1rem">
      <h2>Test String</h2>
      <textarea id="textInput" placeholder="Enter text to test against..." spellcheck="false">The quick brown fox jumps over 42 lazy dogs at 3:15pm on 2026-03-29.</textarea>
    </div>

    <div class="panel" style="margin-bottom:1rem">
      <h2>Highlighted Matches</h2>
      <div class="highlight-area" id="highlightArea"></div>
      <div class="stats" id="stats"></div>
    </div>

    <div class="panel">
      <h2>Match Details</h2>
      <div class="match-list" id="matchList"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel" style="flex:1;overflow-y:auto">
      <h2>Explanation</h2>
      <ul class="explain-list" id="explainList"></ul>
    </div>
  </div>
</div>

<script>
(function() {
  const regexInput = document.getElementById('regexInput');
  const textInput = document.getElementById('textInput');
  const highlightArea = document.getElementById('highlightArea');
  const matchList = document.getElementById('matchList');
  const explainList = document.getElementById('explainList');
  const errorMsg = document.getElementById('errorMsg');
  const statsEl = document.getElementById('stats');
  const commonSelect = document.getElementById('commonSelect');
  const flagBoxes = ['flagG','flagI','flagM','flagS'].map(id => document.getElementById(id));

  // Load common patterns
  fetch('/api/common').then(r => r.json()).then(data => {
    data.patterns.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.pattern;
      opt.textContent = p.name + ' — ' + p.description;
      commonSelect.appendChild(opt);
    });
  });

  commonSelect.addEventListener('change', () => {
    if (commonSelect.value) {
      regexInput.value = commonSelect.value;
      update();
    }
  });

  function getFlags() {
    return ['g','i','m','s'].filter((f,i) => flagBoxes[i].checked).join('');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function update() {
    const pattern = regexInput.value;
    const text = textInput.value;
    errorMsg.textContent = '';

    if (!pattern) {
      highlightArea.innerHTML = escapeHtml(text);
      matchList.innerHTML = '';
      explainList.innerHTML = '';
      statsEl.innerHTML = '';
      return;
    }

    // Explain
    try {
      const eres = await fetch('/api/explain', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ pattern })
      });
      const edata = await eres.json();
      if (edata.error) throw new Error(edata.error);
      explainList.innerHTML = edata.tokens.map(t =>
        '<li><span class="token-raw">' + escapeHtml(t.raw) + '</span><span class="token-explain">' + escapeHtml(t.explanation) + '</span></li>'
      ).join('');
    } catch(e) {
      explainList.innerHTML = '';
    }

    // Match
    try {
      const flags = getFlags();
      const mres = await fetch('/api/match', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ pattern, text, flags })
      });
      const mdata = await mres.json();

      if (mdata.error) {
        errorMsg.textContent = mdata.error;
        highlightArea.innerHTML = escapeHtml(text);
        matchList.innerHTML = '';
        statsEl.innerHTML = '';
        return;
      }

      const matches = mdata.matches;
      statsEl.innerHTML = '<div class="stat">Matches: <strong>' + matches.length + '</strong></div>' +
        (matches.length > 0 ? '<div class="stat">Groups: <strong>' + (matches[0].groups?.length || 0) + '</strong></div>' : '');

      // Highlight
      if (matches.length === 0) {
        highlightArea.innerHTML = escapeHtml(text);
      } else {
        let html = '';
        let last = 0;
        for (const m of matches) {
          html += escapeHtml(text.slice(last, m.index));
          html += '<span class="match">' + escapeHtml(m.match) + '</span>';
          last = m.end;
        }
        html += escapeHtml(text.slice(last));
        highlightArea.innerHTML = html;
      }

      // Match details
      matchList.innerHTML = matches.map((m, i) => {
        let html = '<div class="match-item">';
        html += '<span class="match-val">' + escapeHtml(m.match) + '</span> ';
        html += '<span class="match-pos">index ' + m.index + '-' + m.end + '</span>';
        if (m.groups && m.groups.length > 0) {
          m.groups.forEach(g => {
            const label = g.name ? 'Group ' + g.index + ' (' + g.name + ')' : 'Group ' + g.index;
            html += '<div class="match-group">' + label + ': ' + escapeHtml(g.value) + '</div>';
          });
        }
        html += '</div>';
        return html;
      }).join('');

    } catch(e) {
      errorMsg.textContent = e.message || 'Error';
    }
  }

  let debounceTimer;
  function debounceUpdate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(update, 150);
  }

  regexInput.addEventListener('input', debounceUpdate);
  textInput.addEventListener('input', debounceUpdate);
  flagBoxes.forEach(cb => cb.addEventListener('change', debounceUpdate));

  // Initial
  regexInput.value = '\\d+';
  update();
})();
</script>
</body>
</html>
